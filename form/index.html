<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ask a general question or contact us about a bowling ball for sale.">
  <title>Bowling Ball Questions</title>

  <style>
    :root {
      --bg: #f6f2ea;
      --bg-deep: #1f2523;
      --ink: #202624;
      --muted: #68706a;
      --panel: #fffaf0;
      --field: #fffdf8;
      --line: #ded2bf;
      --accent: #bc3f32;
      --teal: #1e6b66;
      --gold: #c48a2c;
      --error: #9d2f35;
      --shadow: 0 18px 45px rgba(37, 30, 20, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg-deep);
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 32px 20px;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(30, 107, 102, 0.08) 0 25%, transparent 25% 50%, rgba(188, 63, 50, 0.07) 50% 75%, transparent 75%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 42%, #efe5d6 100%);
      background-size: 34px 34px, auto;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--teal), var(--bg-deep));
    }

    .back-home-button {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 10px 14px;
      border: 1px solid rgba(32, 38, 36, 0.16);
      border-radius: 8px;
      color: #fffaf0;
      background: var(--bg-deep);
      box-shadow: 0 12px 28px rgba(37, 30, 20, 0.16);
      font-size: 0.9rem;
      font-weight: 800;
      text-decoration: none;
    }

    .back-home-button:hover {
      background: var(--accent);
    }

    .back-home-button:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(30, 107, 102, 0.24);
      outline-offset: 3px;
    }

    .contact-card {
      position: relative;
      width: min(100%, 760px);
      margin: 48px auto 0;
      padding: clamp(28px, 5vw, 52px);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 250, 240, 0.9);
      box-shadow: var(--shadow);
    }

    .contact-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 7px;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--teal));
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--teal);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2rem, 7vw, 4.1rem);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1::after {
      content: "";
      display: block;
      width: 86px;
      height: 6px;
      margin-top: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
    }

    .intro {
      max-width: 580px;
      margin: 18px 0 32px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.08rem);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 20px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--teal);
      font-size: 0.9rem;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--field);
      font: inherit;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    input,
    select {
      height: 50px;
      padding: 0 15px;
    }

    textarea {
      min-height: 150px;
      padding: 14px 15px;
      resize: vertical;
      line-height: 1.5;
    }

    input::placeholder,
    textarea::placeholder {
      color: #82796d;
    }

    input:hover,
    select:hover,
    textarea:hover,
    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      outline: none;
      box-shadow: 0 0 0 3px rgba(30, 107, 102, 0.14);
    }

    select {
      cursor: pointer;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 4px;
    }

    .privacy-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    button {
      flex: 0 0 auto;
      min-width: 166px;
      min-height: 50px;
      padding: 0 22px;
      border: 0;
      border-radius: 8px;
      color: #fffaf0;
      background: var(--bg-deep);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      transition: background 150ms ease, transform 150ms ease, opacity 150ms ease;
    }

    button:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .status {
      display: none;
      margin: 0;
      padding: 13px 15px;
      border: 1px solid rgba(30, 107, 102, 0.28);
      border-radius: 8px;
      color: var(--teal);
      background: rgba(30, 107, 102, 0.08);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .status.visible {
      display: block;
    }

    .status.error {
      border-color: rgba(157, 47, 53, 0.34);
      color: var(--error);
      background: rgba(157, 47, 53, 0.08);
    }

    @media (max-width: 620px) {
      body {
        display: block;
        padding: 82px 14px 24px;
      }

      .back-home-button {
        top: 14px;
        left: 14px;
      }

      .contact-card {
        margin: 0;
      }

      .field-row {
        grid-template-columns: 1fr;
      }

      .form-footer {
        align-items: stretch;
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <a class="back-home-button" href="../" aria-label="Back to home">← Back Home</a>

  <main class="contact-card">
    <p class="eyebrow">Bowling ball contact</p>
    <h1>Let’s talk bowling.</h1>
    <p class="intro">Have a general question or want to know more about a bowling ball for sale? Send us a message and we’ll get back to you soon.</p>

    <form id="contact-form" action="https://formspree.io/f/mojoadez" method="POST">
      <div class="field-row">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" required>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="field">
        <label for="subject">What is your question about?</label>
        <select id="subject" name="subject" required>
          <option value="" selected disabled>Choose a topic</option>
          <option value="general">General question</option>
          <option value="ball-for-sale">Question about a ball for sale</option>
        </select>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Type your question here. If you’re asking about a ball, include its name or listing…" required minlength="10"></textarea>
      </div>

      <p id="form-status" class="status" role="status" aria-live="polite" tabindex="-1"></p>

      <div class="form-footer">
        <p class="privacy-note">Your details stay private. No spam, no nonsense.</p>
        <button type="submit">Send message →</button>
      </div>
    </form>
  </main>

  <script>
    const form = document.querySelector('#contact-form');
    const status = document.querySelector('#form-status');
    const submitButton = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const name = form.elements.name.value.trim();
      submitButton.disabled = true;
      submitButton.textContent = 'Sending…';
      status.classList.remove('visible', 'error');

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: new FormData(form),
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          const result = await response.json().catch(() => ({}));
          const message = result.errors?.map((error) => error.message).join(' ') ||
            'We couldn\'t send your message. Please check your details and try again.';
          throw new Error(message);
        }

        status.textContent = `Thanks, ${name}! Your message has been sent.`;
        status.classList.add('visible');
        form.reset();
      } catch (error) {
        status.textContent = error.message || 'Something went wrong. Please try again.';
        status.classList.add('visible', 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Send message →';
        status.focus();
      }
    });
  </script>
</body>
</html>
